<!DOCTYPE html>

  <style type="text/tailwindcss">
    @layer utilities {
      .crt-overlay {
        position: fixed;
        top: 0; left: 0;

        background: linear-gradient(rgba(255,255,255,0) 50%, rgba(0,0,0,0.02) 50%),

        z-index: 100;
        background-size: 100% 3px, 3px 100%;
        pointer-events: none;
      }
      .pixel-border-mint {
        box-shadow: 0 -4px 0 0 #B2F2BB, 0 4px 0 0 #B2F2BB, -4px 0 0 0 #B2F2BB, 4px 0 0 0 #B2F2BB;
      }
      .pixel-border-pink {
        box-shadow: 0 -4px 0 0 #FFD6E0, 0 4px 0 0 #FFD6E0, -4px 0 0 0 #FFD6E0, 4px 0 0 0 #FFD6E0;
      }
      .pixel-border-lavender {

      }

  box-shadow: 0 -4px 0 0 #4DA6FF, 0 4px 0 0 #4DA6FF, -4px 0 0 0 #4DA6FF, 4px 0 0 0 #4DA6FF;
}

      .title-3d-shadow {

        -webkit-text-stroke: 1px theme('colors.deep-charcoal');

        text-decoration: none;
        color: inherit;
        -webkit-tap-highlight-color: transparent;
      }
      .game-card:active .card-image { transform: scale(0.97); }
      .game-card:hover .card-image  { transform: scale(1.03); }
      .card-image { transition: transform 0.15s ease; }
    }
  </style>
